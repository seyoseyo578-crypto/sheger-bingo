<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>ሸገር ቢንጎ</title>
    <style>
        :root { --bg: #ffffff; --text: #000000; --card: rgba(255,255,255,0.8); }
        body.dark { --bg: #1a1a1a; --text: #ffffff; --card: rgba(45,45,45,0.8); }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; text-align: center; }
        .header { display: flex; justify-content: space-between; padding: 15px; background: var(--card); }
        #board-container { background: url('logo.png') no-repeat center center; background-size: contain; padding: 20px; }
        .cell { width: 35px; height: 35px; border: 1px solid #777; display: inline-block; border-radius: 50%; }
        .called { background-color: #000 !important; color: white !important; }
        #menu-panel { display: none; background: var(--card); padding: 20px; position: fixed; right: 0; width: 300px; height: 100%; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="header">
    <div id="prize-pool">ሽልማት: $0</div>
    <div onclick="document.getElementById('menu-panel').style.display='block'">☰ ሜኑ</div>
</div>

<div id="menu-panel">
    <button onclick="this.parentElement.style.display='none'">X</button>
    <h3>Settings</h3>
    <button onclick="document.body.classList.toggle('dark')">Dark/Light Mode</button>
    <h4>Deposit</h4>
    <p>ቴሌብር: SUED +251964796846</p>
    <p>ንግድ ባንክ: SIED MEBRAHTU 1000615139126</p>
    <h4>Withdraw</h4>
    <button onclick="alert('ወጪው ለባለቤቱ ተልኳል')">Withdraw (>200 ብር)</button>
</div>

<h2>BINGO</h2>
<div id="board"></div>
<button id="plus-btn" onclick="addPlayer()">+ ካርቴላ ያክሉ</button>
<div id="cards-container"></div>

<script>
    let players = 1;
    function updateStats() {
        document.getElementById('prize-pool').innerText = "ሽልማት: $" + (players * 10 * 0.75);
    }

    function addPlayer() {
        if(players < 250) {
            players++;
            renderCard(players);
            updateStats();
        }
    }

    // 250 ካርቴላዎችን ለማመንጨት ተግባር
    function renderCard(id) {
        let container = document.getElementById('cards-container');
        let card = document.createElement('div');
        card.innerHTML = `<h4>ካርቴላ #${id}</h4>`;
        let grid = document.createElement('div');
        // እዚህ ጋር የቢንጎ ቁጥሮችን በ 5x5 ማትሪክስ መሃሉን 'FREE' በማድረግ ይፈጥራል
        // (ለኮድ አጭርነት የሎጅኩን መዋቅር አሳይቻለሁ)
        container.appendChild(card);
    }

    // የቁጥር መጥሪያ ሎጅክ
    let drawn = [];
    setInterval(() => {
        let num = Math.floor(Math.random() * 75) + 1;
        if(!drawn.includes(num)) {
            drawn.push(num);
            document.getElementById('current-num').innerText = num;
        }
    }, 3000);
    
    updateStats();
</script>
</body>
</html>
