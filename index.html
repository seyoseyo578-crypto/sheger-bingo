<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sheger Bingo</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f2f2;
color:#222;
transition:0.3s;
}

.dark{
background:#111;
color:white;
}

header{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px;
background:white;
}

.dark header{
background:#222;
}

.logo{
width:70px;
height:70px;
border-radius:50%;
object-fit:contain;
}

.menu{
font-size:30px;
cursor:pointer;
}

.container{
text-align:center;
padding:15px;
}

.panel{
background:white;
margin:10px;
padding:15px;
border-radius:10px;
}

.dark .panel{
background:#222;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
margin:5px;
}

.plus{
width:60px;
height:60px;
font-size:30px;
border-radius:50%;
background:#008cff;
color:white;
}

.hidden{
display:none;
}

.bingo-card{
display:grid;
grid-template-columns:repeat(5,50px);
gap:5px;
justify-content:center;
margin:20px;
}

.cell{
width:50px;
height:50px;
border:1px solid #777;
display:flex;
align-items:center;
justify-content:center;
background:white;
font-weight:bold;
}

.dark .cell{
background:#333;
color:white;
}

.head{
background:#008cff;
color:white;
}

.free{
background:#ffcc00;
}

</style>

</head>


<body>


<header>

<img src="logo.png" class="logo">

<h2>Sheger Bingo</h2>

<div class="menu" onclick="openMenu()">☰</div>

</header>



<div class="container">


<div class="panel">

<h3>ሽልማት: $0</h3>

</div>



<div id="menu" class="panel hidden">

<h3>⚙️ Settings</h3>

<button onclick="darkMode()">
Dark / Light Mode
</button>


<h3>💰 Deposit</h3>

<p>
Telebirr<br>
SUED<br>
+251964796846
</p>


<p>
ንግድ ባንክ<br>
SIED MEBRAHTU<br>
1000615139126
</p>



<h3>💸 Withdraw</h3>

<p>
Minimum 200 ብር
</p>


</div>



<h2>BINGO</h2>


<h3 id="cardTitle">
ካርቴላ 1
</h3>


<div id="card" class="bingo-card"></div>


<button class="plus">
+
</button>


</div>



<script>


function openMenu(){

document
.getElementById("menu")
.classList
.toggle("hidden");

}



function darkMode(){

document.body.classList.toggle("dark");

}



</script>


</body>
</html>
