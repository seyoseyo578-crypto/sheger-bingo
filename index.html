<!DOCTYPE html>
<html lang="am">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sheger Bingo</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<img src="logo.png" class="logo">

<h2>Sheger Bingo</h2>

<div class="menu" onclick="openMenu()">
☰
</div>

</header>



<div class="container">


<div class="panel">
<h3>
ሽልማት: <span id="balance">$0</span>
</h3>
</div>



<!-- MENU -->

<div id="menu" class="panel hidden">


<h3>⚙️ Settings</h3>

<button onclick="darkMode()">
Dark / Light Mode
</button>



<h3>💰 Deposit</h3>

<p>
Telebirr<br>
SUED<br>
+251964796846
</p>


<p>
ንግድ ባንክ<br>
SIED MEBRAHTU<br>
1000615139126
</p>


<input id="depositAmount"
type="number"
placeholder="መጠን ብር">


<input id="depositProof"
placeholder="የክፍያ ማረጋገጫ">


<button onclick="sendDeposit()">
Deposit ላክ
</button>



<h3>💸 Withdraw</h3>


<p>
Minimum Withdraw: 200 ብር
</p>


<input id="withdrawAmount"
type="number"
placeholder="መጠን">


<input id="withdrawAccount"
placeholder="Telebirr/CBE">


<button onclick="sendWithdraw()">
Withdraw ጠይቅ
</button>


</div>





<h2>BINGO</h2>



<h3 id="cardTitle">
ካርቴላ 1
</h3>


<div id="card" class="bingo-card">

</div>



<button class="plus"
onclick="showCards()">

+

</button>





<!-- CARD LIST -->


<div id="cards" class="panel hidden">


<h3>
ካርቴላ ምረጥ
</h3>


<div id="list">

</div>


</div>





<!-- CALLER -->


<div class="panel">


<h3>
🎱 Bingo Caller
</h3>


<h2 id="activeNumber">
-
</h2>


<button onclick="callNumber()">

ቁጥር ጥራ

</button>


</div>





<h3>
የተጠሩ ቁጥሮች
</h3>


<div id="called"
class="called">

</div>






<!-- PRIZE -->


<div class="panel">


<h3>
🏆 ሽልማት Calculator
</h3>


<input id="players"
type="number"
placeholder="የካርቴላ ብዛት">


<button onclick="calculatePrize()">

አስላ

</button>


<p id="result">

</p>


</div>




</div>





<script src="script.js"></script>


</body>

</html>
