<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>ሸገር ቢንጎ</title>
    <style>
        :root { --bg: #ffffff; --text: #000000; --card: rgba(255,255,255,0.7); }
        body.dark { --bg: #1a1a1a; --text: #ffffff; --card: rgba(45,45,45,0.7); }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; text-align: center; }
        
        .header { display: flex; justify-content: space-between; padding: 15px; background: var(--card); }
        #board-container { background: url('logo.png') no-repeat center center; background-size: contain; padding: 20px; border: 2px solid #555; }
        .bingo-row { display: flex; justify-content: center; gap: 5px; margin-bottom: 5px; }
        .cell { width: 35px; height: 35px; border: 1px solid #777; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: var(--card); }
        .called { background-color: #000 !important; color: white !important; font-weight: bold; }
        .owner-cell { border: 3px solid #d32f2f; }
        
        #current-num { font-size: 50px; font-weight: bold; color: #d32f2f; margin: 10px; }
        .controls { margin-top: 20px; }
        #plus-btn { font-size: 30px; cursor: pointer; background: #28a745; color: white; border-radius: 50%; width: 60px; height: 60px; border: none; }
    </style>
</head>
<body>

    <div class="header">
        <div>ተጫዋቾች: <span id="p-count">1</span></div>
        <div id="prize-pool">ሽልማት: $0</div>
    </div>

    <div id="current-num">--</div>

    <div id="board-container">
        <h2>BINGO</h2>
        <div id="board"></div>
    </div>

    <div class="controls">
        <button id="plus-btn" onclick="addPlayer()">+</button>
        <p>ካርቴላ ይጨምሩ</p>
    </div>

    <script>
        let players = 1;
        let cardPrice = 10;
        
        function updateStats() {
            let totalRevenue = players * cardPrice;
            document.getElementById('prize-pool').innerText = "ሽልማት: $" + (totalRevenue * 0.75);
            document.getElementById('p-count').innerText = players;
        }

        function addPlayer() {
            if (players < 250) {
                players++;
                updateStats();
            }
        }

        const board = document.getElementById('board');
        for (let i = 0; i < 5; i++) {
            let rowDiv = document.createElement('div');
            rowDiv.className = 'bingo-row';
            for (let j = 1; j <= 15; j++) {
                let num = (i * 15) + j;
                let cell = document.createElement('div');
                cell.className = 'cell';
                if (num === 48 || num === 68) cell.classList.add('owner-cell');
                cell.id = 'cell-' + num;
                cell.innerText = num;
                rowDiv.appendChild(cell);
            }
            board.appendChild(rowDiv);
        }

        let drawn = [];
        function autoDraw() {
            if (drawn.length >= 75) return;
            let num;
            do { num = Math.floor(Math.random() * 75) + 1; } while (drawn.includes(num));
            drawn.push(num);
            document.getElementById('current-num').innerText = num;
            document.getElementById('cell-' + num).classList.add('called');
        }
        setInterval(autoDraw, 3000);
        updateStats();
    </script>
</body>
</html>
