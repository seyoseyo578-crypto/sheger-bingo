<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sheger Bingo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <img src="logo.png" alt="Sheger Bingo Logo" class="logo">
  <h2>Sheger Bingo</h2>
  <div class="menu" onclick="openMenu()">☰</div>
</header>

<div class="container">

  <div class="balance">ሽልማት: <b>0 ብር</b></div>

  <!-- ================= Settings / Menu ================= -->
  <div id="menuPanel" class="panel hidden">
    <h3>⚙️ Settings</h3>
    <button onclick="darkMode()">Dark / Light Mode</button>

    <h3>💰 Deposit</h3>
    <p>Telebirr: SUED<br>+251964796846</p>
    <p>ንግድ ባንክ:<br>SIED MEBRAHTU<br>1000615139126</p>
    <input id="depositAmount" type="number" placeholder="መጠን ብር">
    <input id="depositProof" type="text" placeholder="የክፍያ ማረጋገጫ">
    <button onclick="sendDeposit()">Deposit ላክ</button>

    <h3>💸 Withdraw</h3>
    <p>Minimum Withdraw: 200 ብር</p>
    <input id="withdrawAmount" type="number" placeholder="መጠን">
    <input id="withdrawAccount" type="text" placeholder="Telebirr/CBE ቁጥር">
    <button onclick="sendWithdraw()">Withdraw ጠይቅ</button>
  </div>

  <!-- ================= 1) Card selection (first) ================= -->
  <h3 class="section-title">🎫 ካርቴላ ምረጥ</h3>
  <div class="plus-row">
    <button class="plus" onclick="showCards()">+</button>
    <span>ከ1 እስከ 250 ካርቴላ ውስጥ ይምረጡ</span>
  </div>

  <div id="cardsPanel" class="panel hidden">
    <div id="cardsList" class="cards-grid"></div>
  </div>

  <!-- ================= 2) Bingo game table ================= -->
  <h3 class="section-title">🎱 የቢንጎ ጨዋታ</h3>
  <div id="gameSection" class="panel">

    <div class="round-status" id="roundStatus">-</div>
    <div class="reg-countdown" id="regCountdown"></div>

    <div class="card-header-row">
      <h3 id="cardTitle">ካርቴላ -</h3>
      <button class="bingo-claim-btn" id="bingoClaimBtn" onclick="claimBingo()" disabled>🏆 BINGO</button>
    </div>

    <div class="register-row">
      <button class="register-btn" id="registerBtn" onclick="sendRegisterCard()" disabled>አመዝግብ</button>
    </div>

    <div class="bingo-header">
      <div class="cell head-b">B</div>
      <div class="cell head-i">I</div>
      <div class="cell head-n">N</div>
      <div class="cell head-g">G</div>
      <div class="cell head-o">O</div>
    </div>

    <div id="cardGrid" class="bingo-card"></div>

    <div class="active-number-box">
      <p>የተጠራው ቁጥር</p>
      <div id="activeNumber" class="circle">-</div>
    </div>

    <h3>የተጠሩ ቁጥሮች</h3>
    <div id="calledList" class="called"></div>
  </div>

  <!-- ================= Prize calculator ================= -->
  <div class="panel">
    <h3>🏆 ሽልማት Calculator</h3>
    <div class="registered-count">የተመዘገቡ ካርቴላዎች አሁን: <b id="registeredCount">0</b></div>
    <input id="players" type="number" placeholder="የተመዘገቡ ካርቴላዎች (ባዶ ከሆነ በራስሰር ይሰላል)">
    <button onclick="calculatePrize()">አስላ</button>
    <p id="result"></p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
