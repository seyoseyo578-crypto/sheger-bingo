<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>ሸገር ቢንጎ</title>
    <style>
        :root { --bg: #ffffff; --text: #000000; --card: #f4f4f4; }
        body.dark { --bg: #1a1a1a; --text: #ffffff; --card: #2d2d2d; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        
        .header-stats { display: flex; justify-content: space-around; background: var(--card); padding: 10px; border-radius: 10px; margin-bottom: 20px; }
        .bingo-row { display: flex; justify-content: center; gap: 5px; margin-bottom: 5px; }
        .cell { width: 40px; height: 40px; border: 1px solid #555; display: flex; align-items: center; justify-content: center; border-radius: 5px; background: var(--card); }
        .called { background-color: #28a745; color: white; }
        .bingo-label { width: 40px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        
        button { padding: 10px 20px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="header-stats">
        <div>ዋጋ: $10</div>
        <div>ተጫዋቾች: 1</div>
        <div>ሽልማት: $20,000</div>
    </div>

    <button onclick="document.body.classList.toggle('dark')">Dark/Light Mode</button>

    <h2>BINGO</h2>
    <div id="board"></div>

    <script>
        const board = document.getElementById('board');
        const labels = ['B', 'I', 'N', 'G', 'O'];
        for (let i = 0; i < 5; i++) {
            let rowDiv = document.createElement('div');
            rowDiv.className = 'bingo-row';
            let label = document.createElement('div');
            label.className = 'bingo-label';
            label.innerText = labels[i];
            rowDiv.appendChild(label);
            for (let j = 1; j <= 15; j++) {
                let cell = document.createElement('div');
                let num = (i * 15) + j;
                cell.className = 'cell';
                cell.id = 'cell-' + num;
                cell.innerText = num;
                rowDiv.appendChild(cell);
            }
            board.appendChild(rowDiv);
        }

        let drawn = [];
        function autoDraw() {
            if (drawn.length >= 75) return;
            let num;
            do { num = Math.floor(Math.random() * 75) + 1; } while (drawn.includes(num));
            drawn.push(num);
            document.getElementById('cell-' + num).classList.add('called');
        }
        setInterval(autoDraw, 3000);
    </script>
</body>
</html>
