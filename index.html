<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sheger Bingo</title>

<style>
*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 font-family:Arial,sans-serif;
}

body{
 background:#f2f2f2;
 color:#222;
 transition:.3s;
}

.dark{
 background:#111;
 color:white;
}

header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:15px;
 background:#fff;
}

.dark header{
 background:#222;
}

.logo{
 width:70px;
 height:70px;
 object-fit:contain;
 border-radius:50%;
}

.menu{
 font-size:30px;
 cursor:pointer;
}

.container{
 padding:15px;
 text-align:center;
}

.balance{
 font-size:20px;
 margin:10px;
}

button{
 padding:10px 15px;
 border:none;
 border-radius:8px;
 cursor:pointer;
 margin:5px;
}

.plus{
 font-size:30px;
 width:60px;
 height:60px;
 border-radius:50%;
 background:#008cff;
 color:white;
}

.bingo-card{
 display:grid;
 grid-template-columns:repeat(5,50px);
 gap:5px;
 justify-content:center;
 margin:20px auto;
}

.cell{
 width:50px;
 height:50px;
 border:1px solid #777;
 display:flex;
 justify-content:center;
 align-items:center;
 background:white;
 font-weight:bold;
}

.dark .cell{
 background:#333;
 color:white;
}

.head{
 background:#008cff;
 color:white;
}

.free{
 background:#ffcc00;
}

.called{
 display:flex;
 flex-wrap:wrap;
 gap:8px;
 justify-content:center;
 margin:15px;
}

.circle{
 width:40px;
 height:40px;
 border-radius:50%;
 background:#008cff;
 color:white;
 display:flex;
 justify-content:center;
 align-items:center;
}

.hidden{
 display:none;
}

.panel{
 background:white;
 padding:15px;
 border-radius:10px;
 margin:10px;
}

.dark .panel{
 background:#222;
}

</style>
</head>

<body>

<header>

<img src="logo.png" class="logo">

<h2>Sheger Bingo</h2>

<div class="menu" onclick="openMenu()">☰</div>

</header>


<div class="container">

<div class="balance">
ሽልማት: <b>$0</b>
</div>


<div id="menu" class="panel hidden">

<h3>Settings</h3>

<button onclick="darkMode()">
Dark / Light Mode
</button>

<h3>Deposit</h3>

<p>Telebirr: SUED<br>
+251964796846</p>

<p>
ንግድ ባንክ:<br>
SIED MEBRAHTU<br>
1000615139126
</p>


<h3>Withdraw</h3>

<p>Minimum: 200 ብር</p>

</div>


<h2>BINGO</h2>

<div id="card" class="bingo-card"></div>


<button class="plus" onclick="showCards()">
+
</button>


<div id="cards" class="panel hidden">

<h3>ካርቴላ ምረጥ</h3>

<div id="list"></div>

</div>


<h3>የተጠሩ ቁጥሮች</h3>

<div id="called" class="called"></div>


</div>
<script>

function openMenu(){
 document.getElementById("menu").classList.toggle("hidden");
}


function darkMode(){
 document.body.classList.toggle("dark");
}


// 1 ካርቴላ መፍጠር
function createCard(){

 let card=document.getElementById("card");
 card.innerHTML="";

 let letters=["B","I","N","G","O"];

 letters.forEach(letter=>{
   let div=document.createElement("div");
   div.className="cell head";
   div.innerHTML=letter;
   card.appendChild(div);
 });


 let nums=[];

 for(let i=1;i<=75;i++){
   nums.push(i);
 }


 for(let i=0;i<24;i++){

   let div=document.createElement("div");
   div.className="cell";

   if(i===12){
    div.innerHTML="FREE";
    div.className="cell free";
   }
   else{
    let n=Math.floor(Math.random()*nums.length);
    div.innerHTML=nums[n];
    nums.splice(n,1);
   }

   card.appendChild(div);
 }

}


// 1-250 ካርቴላ ዝርዝር
function showCards(){

 let box=document.getElementById("cards");

 box.classList.toggle("hidden");

 let list=document.getElementById("list");

 list.innerHTML="";

 for(let i=1;i<=250;i++){

  let btn=document.createElement("button");

  btn.innerHTML="ካርቴላ "+i;

  btn.onclick=function(){
    createCard();
  };

  list.appendChild(btn);

 }

}


createCard();

</script>

</body>
</html>
