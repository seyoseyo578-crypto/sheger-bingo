<!DOCTYPE html>
<html lang="am">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sheger Bingo</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="welcome">

<h1>Welcome to Sheger Bingo</h1>
<h2>እንኳን ደህና መጡ ወደ ሸገር ቢንጎ</h2>

</div>



<header>

<h2>🎱 Sheger Bingo</h2>

<div>
<button>☰ Menu</button>
<button>⚙ Settings</button>
</div>

</header>




<div class="info">


<div>
የካርቴላ ዋጋ:
<b>10 ብር</b>
</div>


<div>
Balance:
<b id="balance">0 ብር</b>
</div>


<div>
ሽልማት:
<b id="prize">0 ብር</b>
</div>


</div>





<div class="panel">


<h2>🎱 Bingo Machine</h2>


<table id="bingoTable">

<tr>

<th>B</th>
<th>I</th>
<th>N</th>
<th>G</th>
<th>O</th>

</tr>


</table>


</div>






<div class="panel">

<h2>Active Number</h2>

<h1 id="activeNumber">-</h1>


</div>






<div class="panel">

<h2>የተጠሩ ቁጥሮች</h2>

<div id="calledNumbers"></div>


</div>




<script src="script.js"></script>


</body>

</html>
